# Builds the distributable Mac (.dmg) and Windows (setup.exe + zip) apps on
# every v* tag and attaches them to a GitHub Release.
#
# Signing is optional and driven by repo secrets — without them you still get
# working (but Gatekeeper/SmartScreen-unfriendly) artifacts:
#   macOS:   MACOS_CERT_P12 (base64 .p12), MACOS_CERT_PASSWORD,
#            CODESIGN_IDENTITY, APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD
#   Windows: (recommended) SignPath or Azure Trusted Signing — add a signing
#            step where marked below once enrolled. See DISTRIBUTION.md.
#
# After publishing, the bump-tap job updates the Homebrew cask in
# jokeane9/homebrew-tap. It needs one secret, TAP_GITHUB_TOKEN — a token with
# contents:write on that tap repo. Without it, the job no-ops (release still
# succeeds); see DISTRIBUTION.md for how to create it.
name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-14
    # Secrets aren't available in `if:` expressions, so surface the one that
    # gates signing as a job-level env var and test that instead. With no
    # secrets set, the import step is skipped and build_macos.sh produces an
    # unsigned DMG — the free launch path.
    env:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pyinstaller
      - name: Import signing certificate (if configured)
        if: env.MACOS_CERT_P12 != ''
        env:
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain
          rm cert.p12
      - name: Build (and sign + notarize if configured)
        env:
          APP_VERSION: ${{ github.ref_name }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./packaging/build_macos.sh
      - uses: actions/upload-artifact@v4
        with: { name: macos-dmg, path: dist/*.dmg }

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pyinstaller pillow pythonnet
      - name: Install Inno Setup (for the installer; zip still ships without it)
        run: choco install innosetup --no-progress -y
        continue-on-error: true
      - run: python packaging/make_ico.py
      - name: Build
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: powershell -ExecutionPolicy Bypass -File packaging/build_windows.ps1
      # --- optional: add SignPath / Azure Trusted Signing step here to sign
      #     "dist/MissionControl-*-setup.exe" before release (DISTRIBUTION.md) ---
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.zip
            dist/*-setup.exe

  release:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    # always() so a platform that needs iteration doesn't block the release —
    # whatever artifacts uploaded get published (Mac ships even if Windows fails).
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with: { merge-multiple: true, path: dist }
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          generate_release_notes: true

  bump-tap:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') && needs.release.result == 'success' }}
    steps:
      - name: Bump Homebrew cask in the tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TAP_REPO: jokeane9/homebrew-tap
          CASK_PATH: Casks/mission-control-desktop.rb
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "No TAP_GITHUB_TOKEN secret — skipping tap auto-bump."
            echo "Add a token with contents:write on ${TAP_REPO} to enable it."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"                        # v1.2.3 -> 1.2.3
          DMG="MissionControl-${VERSION}.dmg"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DMG}"
          echo "Fetching ${URL}"
          for i in 1 2 3 4 5; do
            curl -fsSL -o "$DMG" "$URL" && break
            echo "asset not ready yet, retry ${i}…"; sleep 15
          done
          SHA="$(sha256sum "$DMG" | awk '{print $1}')"
          echo "version=${VERSION} sha256=${SHA}"
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          cd tap
          sed -i -E "s|^  version \"[^\"]*\"|  version \"${VERSION}\"|" "$CASK_PATH"
          sed -i -E "s|^  sha256 \"[0-9a-f]+\"|  sha256 \"${SHA}\"|" "$CASK_PATH"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then echo "cask already current"; exit 0; fi
          git commit -am "mission-control-desktop ${VERSION}"
          git push
