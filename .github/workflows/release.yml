# Builds the distributable Mac (.dmg) and Windows (setup.exe + zip) apps on
# every v* tag and attaches them to a GitHub Release.
#
# Signing is optional and driven by repo secrets — without them you still get
# working (but Gatekeeper/SmartScreen-unfriendly) artifacts:
#   macOS:   MACOS_CERT_P12 (base64 .p12), MACOS_CERT_PASSWORD,
#            CODESIGN_IDENTITY, APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD
#   Windows: SignPath (free for OSS) — the signing step is already wired in the
#            windows job; it activates once SIGNPATH_API_TOKEN + SIGNPATH_ORG_ID
#            secrets are set and the project/policy slugs match. See DISTRIBUTION.md.
#
# After publishing:
#   bump-tap  updates the Homebrew cask in jokeane9/homebrew-tap (secret
#             TAP_GITHUB_TOKEN, contents:write on that repo).
#   winget    submits a winget-pkgs update PR (secret WINGET_TOKEN; requires the
#             package to already exist there — first submission is manual).
# Both no-op without their secret, so the release still succeeds. See DISTRIBUTION.md.
name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-14
    # Secrets aren't available in `if:` expressions, so surface the one that
    # gates signing as a job-level env var and test that instead. With no
    # secrets set, the import step is skipped and build_macos.sh produces an
    # unsigned DMG — the free launch path.
    env:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pyinstaller
      - name: Import signing certificate (if configured)
        if: env.MACOS_CERT_P12 != ''
        env:
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain
          rm cert.p12
      - name: Build (and sign + notarize if configured)
        env:
          APP_VERSION: ${{ github.ref_name }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./packaging/build_macos.sh
      - uses: actions/upload-artifact@v7
        with: { name: macos-dmg, path: dist/*.dmg }

  windows:
    runs-on: windows-latest
    # SignPath signing runs only when SIGNPATH_API_TOKEN is set. Secrets aren't
    # usable in `if:`, so surface it as a job-level env var and gate on that.
    # Until enrollment clears, the installer ships UNSIGNED — the free path.
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pyinstaller pillow pythonnet
      - name: Install Inno Setup (for the installer; zip still ships without it)
        run: choco install innosetup --no-progress -y
        continue-on-error: true
      - run: python packaging/make_ico.py
      - name: Build
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: powershell -ExecutionPolicy Bypass -File packaging/build_windows.ps1

      # ---- Code signing via SignPath (free for OSS) ----
      # To enable: add secrets SIGNPATH_API_TOKEN + SIGNPATH_ORG_ID, and make
      # sure project-slug / signing-policy-slug below match your SignPath
      # project (created during enrollment). See DISTRIBUTION.md → Windows.
      # SignPath fetches the artifact by its GitHub artifact id, so the unsigned
      # installer is uploaded first, then overwritten in-place with the signed one.
      - name: Upload unsigned installer for SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        id: unsigned
        uses: actions/upload-artifact@v7
        with:
          name: windows-unsigned-installer
          path: dist/*-setup.exe
          if-no-files-found: error
      - name: Sign installer with SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: orrery
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist    # overwrites dist/*-setup.exe, now signed
      - name: Note unsigned build
        if: env.SIGNPATH_API_TOKEN == ''
        run: echo "SIGNPATH_API_TOKEN not set — shipping UNSIGNED installer (free path)."

      - uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: |
            dist/*.zip
            dist/*-setup.exe

  release:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    # always() so a platform that needs iteration doesn't block the release —
    # whatever artifacts uploaded get published (Mac ships even if Windows fails).
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v8
        with: { merge-multiple: true, path: dist }
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          draft: false
          generate_release_notes: true

  bump-tap:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') && needs.release.result == 'success' }}
    steps:
      - name: Bump Homebrew cask in the tap
        env:
          # gh reads GH_TOKEN for auth; a fine-grained PAT authenticates to the
          # REST API as a Bearer token (its native path) — far more reliable
          # than git-over-HTTPS basic auth for these tokens.
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TAP_REPO: jokeane9/homebrew-tap
          CASK_PATH: Casks/orrery.rb
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "No TAP_GITHUB_TOKEN secret — skipping tap auto-bump."
            echo "Add a token with contents:write on ${TAP_REPO} to enable it."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"                        # v1.2.3 -> 1.2.3
          DMG="Orrery-${VERSION}.dmg"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DMG}"
          echo "Fetching ${URL}"
          for i in 1 2 3 4 5; do
            curl -fsSL -o "$DMG" "$URL" && break
            echo "asset not ready yet, retry ${i}…"; sleep 15
          done
          SHA="$(sha256sum "$DMG" | awk '{print $1}')"
          echo "version=${VERSION} sha256=${SHA}"
          # Read the current cask + its blob sha, edit, and commit it back
          # through the Contents API (no git push, no basic-auth).
          gh api "repos/${TAP_REPO}/contents/${CASK_PATH}" --jq '.content' | base64 -d > cask.rb
          BLOB_SHA="$(gh api "repos/${TAP_REPO}/contents/${CASK_PATH}" --jq '.sha')"
          sed -i -E "s|^  version \"[^\"]*\"|  version \"${VERSION}\"|" cask.rb
          sed -i -E "s|^  sha256 \"[0-9a-f]+\"|  sha256 \"${SHA}\"|" cask.rb
          gh api -X PUT "repos/${TAP_REPO}/contents/${CASK_PATH}" \
            -f message="orrery ${VERSION}" \
            -f content="$(base64 -w0 cask.rb)" \
            -f sha="${BLOB_SHA}" \
            -f branch=main
          echo "cask updated to ${VERSION}"

  winget:
    needs: release
    runs-on: windows-latest
    # Keeps an EXISTING winget listing in sync on each release. Dormant until
    # WINGET_TOKEN is set (secrets aren't usable in `if:`, so gate via env var).
    # `wingetcreate update` only works once the package is already in
    # winget-pkgs — do the FIRST submission manually (packaging/winget/README.md),
    # then this auto-PRs every later version. Also depends on signing (#7):
    # winget rejects low-reputation unsigned installers.
    if: ${{ startsWith(github.ref, 'refs/tags/') && needs.release.result == 'success' }}
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Submit winget update
        if: env.WINGET_TOKEN != ''
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')      # v1.2.0 -> 1.2.0
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Orrery-$version-setup.exe"
          Write-Host "winget update JohnOKeane.Orrery -> $version"
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update JohnOKeane.Orrery `
            --version $version --urls $url --submit --token $env:WINGET_TOKEN
      - name: Note skipped
        if: env.WINGET_TOKEN == ''
        shell: pwsh
        run: Write-Host "WINGET_TOKEN not set - skipping winget auto-submit (first submission is manual; see packaging/winget/README.md)."
