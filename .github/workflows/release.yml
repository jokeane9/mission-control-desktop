# Builds the distributable Mac (.dmg) and Windows (setup.exe + zip) apps on
# every v* tag and attaches them to a GitHub Release.
#
# Signing is optional and driven by repo secrets — without them you still get
# working (but Gatekeeper/SmartScreen-unfriendly) artifacts:
#   macOS:   MACOS_CERT_P12 (base64 .p12), MACOS_CERT_PASSWORD,
#            CODESIGN_IDENTITY, APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD
#   Windows: (recommended) SignPath or Azure Trusted Signing — add a signing
#            step where marked below once enrolled. See DISTRIBUTION.md.
name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-14
    # Secrets aren't available in `if:` expressions, so surface the one that
    # gates signing as a job-level env var and test that instead. With no
    # secrets set, the import step is skipped and build_macos.sh produces an
    # unsigned DMG — the free launch path.
    env:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pyinstaller
      - name: Import signing certificate (if configured)
        if: env.MACOS_CERT_P12 != ''
        env:
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain
          rm cert.p12
      - name: Build (and sign + notarize if configured)
        env:
          APP_VERSION: ${{ github.ref_name }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./packaging/build_macos.sh
      - uses: actions/upload-artifact@v4
        with: { name: macos-dmg, path: dist/*.dmg }

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pyinstaller pillow pythonnet
      - name: Install Inno Setup (for the installer; zip still ships without it)
        run: choco install innosetup --no-progress -y
        continue-on-error: true
      - run: python packaging/make_ico.py
      - name: Build
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: powershell -ExecutionPolicy Bypass -File packaging/build_windows.ps1
      # --- optional: add SignPath / Azure Trusted Signing step here to sign
      #     "dist/MissionControl-*-setup.exe" before release (DISTRIBUTION.md) ---
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.zip
            dist/*-setup.exe

  release:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    # always() so a platform that needs iteration doesn't block the release —
    # whatever artifacts uploaded get published (Mac ships even if Windows fails).
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with: { merge-multiple: true, path: dist }
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          generate_release_notes: true
