ShortDescription: One window showing the live git state of every project you work on.
Description: >-
  Mission Control is a local, single-window dashboard for developers juggling
  many git repositories. Each project shows its live git state — branch,
  uncommitted, unmerged and unpushed counts — alongside the human context no
  tool can derive: what it is, where prod lives, what you're pushing on.
  Whole-workspace views add a searchable catalog of your Claude Code skills, a
  work log of your commits over time, and every project's roadmap in one place.
  Git data is read live per repo; nothing leaves your machine — no server, no
  account, no telemetry. Free and open source.
